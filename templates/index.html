<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hybris Log Analyzer</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
         background: #f4f5f7; margin: 0; padding: 40px; color: #1f2430; }
  .container { max-width: 640px; margin: 0 auto; background: #fff; border: 1px solid #e4e7ec;
               border-radius: 12px; padding: 32px; box-shadow: 0 1px 2px rgba(16,24,40,0.04); }
  h1 { font-size: 20px; margin-top: 0; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 18px 0 6px; color: #344054; }
  input[type=text], input[type=date], input[type=time], input[type=password], textarea {
    width: 100%; box-sizing: border-box; padding: 9px 12px; border: 1px solid #d0d5dd;
    border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .tabs { display: flex; gap: 8px; margin-top: 18px; }
  .tab-btn { flex: 1; padding: 8px; border: 1px solid #d0d5dd; background: #fff; border-radius: 8px;
             cursor: pointer; font-size: 13px; font-weight: 600; color: #667085; }
  .tab-btn.active { background: #1f2430; color: #fff; border-color: #1f2430; }
  .tab-panel { display: none; margin-top: 14px; }
  .tab-panel.active { display: block; }
  button[type=submit] { margin-top: 26px; width: 100%; padding: 12px; background: #1f2430; color: #fff;
                         border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button[type=submit]:hover { background: #333a47; }
  .error { background: #fdeaea; border: 1px solid #f3b4b4; color: #a02020; padding: 10px 14px;
           border-radius: 8px; font-size: 13px; margin-bottom: 18px; }
  .hint { font-size: 12px; color: #98a2b3; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>Hybris Log Analyzer</h1>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="POST" action="/analyze" enctype="multipart/form-data">
    <label>Describe the issue</label>
    <textarea name="issue_description" placeholder="e.g. Customers reported checkout failing with a payment timeout error" required></textarea>

    <div class="row">
      <div>
        <label>Date</label>
        <input type="date" name="date" required>
      </div>
      <div>
        <label>Start time</label>
        <input type="time" name="start_time" required>
      </div>
      <div>
        <label>End time</label>
        <input type="time" name="end_time" required>
      </div>
    </div>
    <div class="hint">If the end time is earlier than the start time, the window is treated as crossing midnight.</div>

    <label>Log source</label>
    <div class="tabs">
      <div class="tab-btn active" data-tab="upload">Upload file</div>
      <div class="tab-btn" data-tab="sftp">Fetch via SFTP</div>
    </div>

    <div class="tab-panel active" id="panel-upload">
      <input type="hidden" name="source_mode" id="source_mode" value="upload">
      <label>Log file</label>
      <input type="file" name="log_file">
    </div>

    <div class="tab-panel" id="panel-sftp">
      <label>Host</label>
      <input type="text" name="sftp_host" placeholder="e.g. logs.internal.company.com">
      <div class="row">
        <div>
          <label>Port</label>
          <input type="text" name="sftp_port" value="22">
        </div>
        <div style="flex:2">
          <label>Username</label>
          <input type="text" name="sftp_username">
        </div>
      </div>
      <label>Password</label>
      <input type="password" name="sftp_password">
      <label>Remote file path</label>
      <input type="text" name="sftp_path" placeholder="/opt/hybris/data/log/tomcat/wrapper.log">
    </div>

    <button type="submit">Analyze logs</button>
  </form>
</div>

<script>
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('panel-' + tab).classList.add('active');
      document.getElementById('source_mode').value = tab;
    });
  });
</script>
</body>
</html>
